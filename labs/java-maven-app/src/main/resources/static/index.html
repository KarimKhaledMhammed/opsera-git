<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #fdf9f3;
            color: #0d2235;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(13, 34, 53, 0.10);
            padding: 48px 56px;
            max-width: 720px;
            width: 100%;
            text-align: center;
        }

        .card img {
            max-width: 100%;
            height: auto;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #0d2235;
            line-height: 1.4;
        }

        .divider {
            width: 60px;
            height: 4px;
            border-radius: 4px;
            background: linear-gradient(90deg, #16e0b0, #0a6fc2);
            margin: 24px auto 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="opsera.png" alt="Opsera — Impact Unleashed">
        <h1>Welcome to Java Maven Application</h1>
        <div class="divider"></div>
    </div>
</body>
</html>
